name: Eurostat refresh

on:
  schedule:
    # Every Monday at 06:00 UTC
    - cron: "0 6 * * 1"
  workflow_dispatch: # allow manual trigger from GitHub UI

jobs:
  eurostat-pipeline:
    name: Ingest + build Eurostat models
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync

      - name: Run Eurostat pipeline
        run: uv run pipeline eurostat

      - name: Upload DuckDB warehouse
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: warehouse-duckdb
          path: data/warehouse.duckdb
          retention-days: 30

      - name: Upload pipeline status
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-status
          path: logs/
          retention-days: 30
