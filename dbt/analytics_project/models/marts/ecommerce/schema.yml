# schema.yml files define metadata and data quality contracts for mart tables.
# These tests protect BI-serving dimensions/facts from key and referential issues.
version: 2

models:
  - name: gold_dim_products
    # Dimension key contract for product joins.
    columns:
      - name: product_id
        tests:
          - not_null
          - unique

  - name: gold_dim_orders
    # Dimension key contract for order joins.
    columns:
      - name: order_id
        tests:
          - not_null
          - unique

  - name: gold_dim_customers
    # Dimension key contract for customer joins.
    columns:
      - name: customer_id
        tests:
          - not_null
          - unique

  - name: gold_dim_dates
    # Date dimension guarantees one row per date_key/date_day.
    columns:
      - name: date_key
        tests:
          - not_null
          - unique
      - name: date_day
        tests:
          - not_null
          - unique

  - name: gold_fct_sales
    # Fact contracts ensure grain consistency and valid dimension relationships.
    columns:
      - name: order_line_id
        tests:
          - not_null
          - unique
      - name: net_quantity
        tests:
          - not_null
      - name: product_id
        tests:
          - relationships:
              arguments:
                to: ref('gold_dim_products')
                field: product_id
      - name: order_id
        tests:
          - relationships:
              arguments:
                to: ref('gold_dim_orders')
                field: order_id
      - name: customer_id
        tests:
          - relationships:
              arguments:
                to: ref('gold_dim_customers')
                field: customer_id
      - name: order_date
        tests:
          - relationships:
              arguments:
                to: ref('gold_dim_dates')
                field: date_day
