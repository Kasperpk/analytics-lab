# schema.yml files define metadata and data quality contracts for mart tables.
# These tests protect BI-serving dimensions/facts from key and referential issues.
version: 2

models:
  - name: gold_dim_products
    description: >
      Product dimension — one row per product_id.
      Pass-through of silver_products for BI consumption.
    columns:
      - name: product_id
        description: Unique product identifier (PK).
        tests:
          - not_null
          - unique
      - name: sku
        description: Stock-keeping unit code.
      - name: product_name
        description: Human-readable product name.
      - name: product_type
        description: Product type classification.
      - name: category
        description: Product category.
      - name: brand
        description: Product brand.
      - name: cost_price
        description: Wholesale cost per unit.
      - name: list_price
        description: Retail list price per unit.
      - name: is_active
        description: Whether the product is currently active.

  - name: gold_dim_orders
    description: >
      Order dimension — one row per order_id.
      Denormalized order attributes for BI joins.
    columns:
      - name: order_id
        description: Unique order identifier (PK).
        tests:
          - not_null
          - unique
      - name: customer_id
        description: Customer who placed the order.
      - name: order_ts
        description: Timestamp the order was placed.
      - name: order_date
        description: Date the order was placed (truncated from order_ts).
      - name: country
        description: Country where the order originated.
      - name: currency
        description: Currency of the transaction.
      - name: payment_method
        description: Payment method used.
      - name: order_status
        description: Current status of the order.

  - name: gold_dim_customers
    description: >
      Customer dimension — one row per customer_id.
      Aggregated customer-level metrics derived from order history.
    columns:
      - name: customer_id
        description: Unique customer identifier (PK).
        tests:
          - not_null
          - unique
      - name: first_order_ts
        description: Timestamp of customer's first order.
      - name: last_order_ts
        description: Timestamp of customer's most recent order.
      - name: lifetime_order_count
        description: Total number of distinct orders placed.
      - name: primary_country
        description: Most common ordering country.
      - name: primary_currency
        description: Most common ordering currency.

  - name: gold_dim_dates
    description: >
      Date dimension — one row per calendar date found in orders.
      Includes ISO week, quarter, weekend flag, and other calendar attributes.
    columns:
      - name: date_key
        description: Integer date key in YYYYMMDD format (PK).
        tests:
          - not_null
          - unique
      - name: date_day
        description: Calendar date.
        tests:
          - not_null
          - unique
      - name: year_number
        description: Four-digit year.
      - name: month_number
        description: Month number (1–12).
      - name: month_name
        description: Full month name (e.g., January).
      - name: day_of_month
        description: Day of the month (1–31).
      - name: day_of_week_iso
        description: ISO day of week (1=Monday, 7=Sunday).
      - name: day_name
        description: Full day name (e.g., Monday).
      - name: iso_week_number
        description: ISO week number (1–53).
      - name: quarter_number
        description: Calendar quarter (1–4).
      - name: is_weekend
        description: True if Saturday or Sunday.

  - name: gold_fct_sales
    description: >
      Sales fact table — grain is one row per order line.
      Joins silver tables to add order, product, and refund context.
      Calculates gross/net quantities and amounts accounting for refunds.
    columns:
      - name: order_line_id
        description: Unique line item identifier (PK / grain).
        tests:
          - not_null
          - unique
      - name: order_id
        description: Parent order FK.
        tests:
          - relationships:
              arguments:
                to: ref('gold_dim_orders')
                field: order_id
      - name: customer_id
        description: Customer FK.
        tests:
          - relationships:
              arguments:
                to: ref('gold_dim_customers')
                field: customer_id
      - name: product_id
        description: Product FK.
        tests:
          - relationships:
              arguments:
                to: ref('gold_dim_products')
                field: product_id
      - name: order_date
        description: Date the order was placed (FK to date dimension).
        tests:
          - relationships:
              arguments:
                to: ref('gold_dim_dates')
                field: date_day
      - name: gross_quantity
        description: Original quantity ordered.
      - name: refunded_quantity
        description: Estimated units refunded (derived from refund_amount / unit_price).
      - name: net_quantity
        description: Quantity after subtracting refunded units.
        tests:
          - not_null
      - name: gross_sales_amount
        description: Gross revenue (quantity × unit_price).
      - name: refund_amount
        description: Total refund amount applied to this line.
      - name: net_sales_amount
        description: Net revenue after refunds (gross − refund).
