version: 2

models:
  - name: gold_dim_products
    columns:
      - name: product_id
        tests:
          - not_null
          - unique

  - name: gold_dim_orders
    columns:
      - name: order_id
        tests:
          - not_null
          - unique

  - name: gold_dim_customers
    columns:
      - name: customer_id
        tests:
          - not_null
          - unique

  - name: gold_dim_dates
    columns:
      - name: date_key
        tests:
          - not_null
          - unique
      - name: date_day
        tests:
          - not_null
          - unique

  - name: gold_fct_sales
    columns:
      - name: order_line_id
        tests:
          - not_null
          - unique
      - name: net_quantity
        tests:
          - not_null
      - name: product_id
        tests:
          - relationships:
              arguments:
                to: ref('gold_dim_products')
                field: product_id
      - name: order_id
        tests:
          - relationships:
              arguments:
                to: ref('gold_dim_orders')
                field: order_id
      - name: customer_id
        tests:
          - relationships:
              arguments:
                to: ref('gold_dim_customers')
                field: customer_id
      - name: order_date
        tests:
          - relationships:
              arguments:
                to: ref('gold_dim_dates')
                field: date_day
