# schema.yml files define metadata and test contracts for dbt resources.
# Tests here are executed by `dbt test` (or `dbt build`) and fail the run if violations are found.
version: 2

models:
  - name: silver_products
    # Contract: each curated product row must have one valid key.
    columns:
      - name: product_id
        tests:
          - not_null
          - unique

  - name: silver_orders
    # Contract: each curated order row must have one valid key.
    columns:
      - name: order_id
        tests:
          - not_null
          - unique

  - name: silver_order_lines
    # Contract: line keys are unique and reference valid order/product parents.
    columns:
      - name: order_line_id
        tests:
          - not_null
          - unique
      - name: order_id
        tests:
          - relationships:
              arguments:
                to: ref('silver_orders')
                field: order_id
      - name: product_id
        tests:
          - relationships:
              arguments:
                to: ref('silver_products')
                field: product_id

  - name: silver_refunds
    # Contract: refunds must have unique ids and reference an existing order line.
    columns:
      - name: refund_id
        tests:
          - not_null
          - unique
      - name: order_line_id
        tests:
          - relationships:
              arguments:
                to: ref('silver_order_lines')
                field: order_line_id
