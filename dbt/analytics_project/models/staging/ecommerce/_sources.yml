# Source definitions for the ecommerce raw data landing zone.
# Bronze models ingest from these sources; use {{ source('ecommerce_raw', ...) }}
# when migrating away from direct file reads (e.g., on Databricks/Postgres).
#
# For DuckDB local dev the bronze models still use read_csv_auto() directly,
# so these source definitions currently serve documentation & lineage purposes.

version: 2

sources:
  - name: ecommerce_raw
    description: >
      Raw CSV files partitioned by date (dt=YYYY-MM-DD/) in the local
      data/raw/ directory.  On cloud warehouses these map to external
      tables or landing-zone schemas populated by the ingestion pipeline.
    schema: "{{ env_var('DBT_RAW_SCHEMA', 'raw') }}"
    tables:
      - name: orders
        description: Raw order header rows — one per order.
        columns:
          - name: order_id
            description: Unique order identifier (e.g., O2024-0001).
          - name: customer_id
            description: Customer who placed the order.
          - name: order_ts
            description: Order timestamp as string.
          - name: country
            description: Two-letter country code.
          - name: currency
            description: Three-letter ISO currency code.
          - name: payment_method
            description: Payment method used (card, bank_transfer, etc.).
          - name: shipping_amount
            description: Shipping cost as string (cast in silver).
          - name: discount_amount
            description: Order-level discount as string (cast in silver).
          - name: order_status
            description: Current order status.

      - name: order_lines
        description: Raw order line items — one per product per order.
        columns:
          - name: order_line_id
            description: Unique line item identifier (e.g., L2024-0001).
          - name: order_id
            description: Parent order FK.
          - name: product_id
            description: Product FK.
          - name: sku
            description: Product SKU.
          - name: quantity
            description: Quantity ordered (string, cast in silver).
          - name: unit_price
            description: Price per unit (string, cast in silver).
          - name: line_discount_amount
            description: Line-level discount (string, cast in silver).
          - name: tax_rate
            description: Tax rate applied (string, cast in silver).

      - name: products
        description: Raw product catalog — one row per product.
        columns:
          - name: product_id
            description: Unique product identifier (e.g., P001).
          - name: sku
            description: Stock-keeping unit code.
          - name: product_name
            description: Human-readable product name.
          - name: product_type
            description: Product type classification.
          - name: category
            description: Product category.
          - name: brand
            description: Product brand.
          - name: cost_price
            description: Wholesale cost (string, cast in silver).
          - name: list_price
            description: Retail list price (string, cast in silver).
          - name: is_active
            description: Whether product is active ('true'/'false' string).

      - name: refunds
        description: Raw refund events — one per refund request.
        columns:
          - name: refund_id
            description: Unique refund identifier (e.g., R2024-0001).
          - name: order_line_id
            description: Order line FK being refunded.
          - name: order_id
            description: Parent order FK.
          - name: refund_ts
            description: Refund timestamp as string.
          - name: refund_amount
            description: Refund amount (string, cast in silver).
          - name: refund_reason
            description: Customer-provided reason.
          - name: refund_status
            description: Processing status of the refund.
